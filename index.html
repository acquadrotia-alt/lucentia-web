<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Lucentia — Gestionale per parrucchieri ed estetisti</title>
    <meta name="theme-color" content="#1c1917" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Tipografia: Playfair Display (titoli) + Hanken Grotesk (testo/UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* ===== Lucentia · Design System (token + animazioni globali) ===== */
      :root {
        --lc-ease: cubic-bezier(0.22, 1, 0.36, 1);

        /* Identità di brand: oro caldo. Tono "ink" deciso per le azioni primarie. */
        --lc-accent: #8a6a2e;          /* accento funzionale, accessibile su bianco (AA) */
        --lc-accent-strong: #6f5421;   /* hover/active */
        --lc-accent-soft: #f5efe2;     /* tinta tenue per sfondi/badge */
        --lc-accent-ring: rgba(138, 106, 46, 0.30);
        --lc-brand: #b8893b;           /* oro luminoso per momenti di brand (vetrina) */
        --lc-ink: #1c1917;             /* superfici scure / testo forte */

        /* Scala di elevazione coerente (Linear/Stripe-like: ombre morbide e diffuse) */
        --lc-shadow-xs: 0 1px 2px rgba(28, 25, 23, 0.05);
        --lc-shadow-sm: 0 1px 3px rgba(28, 25, 23, 0.06), 0 1px 2px rgba(28, 25, 23, 0.04);
        --lc-shadow-md: 0 6px 16px -6px rgba(28, 25, 23, 0.12), 0 2px 6px -2px rgba(28, 25, 23, 0.08);
        --lc-shadow-lg: 0 18px 40px -18px rgba(28, 25, 23, 0.28);
        --lc-shadow-xl: 0 30px 60px -24px rgba(28, 25, 23, 0.32);

        /* Raggi */
        --lc-radius-sm: 8px; --lc-radius: 12px; --lc-radius-lg: 16px; --lc-radius-xl: 20px;
      }

      html { scroll-behavior: smooth; }
      body { font-family: 'Hanken Grotesk', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; color: #292524; letter-spacing: -0.006em; }

      /* Anello di focus da tastiera coerente su tutta l'app (accessibilità + qualità) */
      :where(a, button, input, select, textarea, [tabindex]):focus-visible {
        outline: 2px solid var(--lc-accent);
        outline-offset: 2px;
        border-radius: var(--lc-radius-sm);
      }

      /* Titoli con serif elegante (stile luxury/beauty) */
      .font-display { font-family: 'Playfair Display', Georgia, 'Times New Roman', serif; letter-spacing: -0.01em; }
      .font-display-i { font-family: 'Playfair Display', Georgia, serif; font-style: italic; }

      /* Micro-interazioni: pulsanti e link reattivi al tocco/hover */
      button:not(:disabled) { transition: transform .15s var(--lc-ease), box-shadow .2s var(--lc-ease), background-color .2s ease, color .2s ease, border-color .2s ease, opacity .2s ease; }
      button:not(:disabled):active { transform: translateY(1px) scale(0.985); }
      a { transition: color .2s ease, opacity .2s ease, transform .15s var(--lc-ease); }

      /* Selezione testo in tinta calda col brand */
      ::selection { background: rgba(184, 137, 59, 0.22); }

      /* Scrollbar discreta */
      * { scrollbar-width: thin; scrollbar-color: #d6d3d1 transparent; }
      *::-webkit-scrollbar { width: 9px; height: 9px; }
      *::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 9px; border: 2px solid transparent; background-clip: content-box; }
      *::-webkit-scrollbar-thumb:hover { background: #a8a29e; background-clip: content-box; }

      /* ===== Keyframes ===== */
      @keyframes lc-fade-up { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
      @keyframes lc-fade-in { from { opacity: 0; } to { opacity: 1; } }
      @keyframes lc-scale-in { from { opacity: 0; transform: scale(0.94) translateY(8px); } to { opacity: 1; transform: none; } }
      @keyframes lc-pop-in { 0% { opacity: 0; transform: scale(0.8); } 60% { transform: scale(1.04); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes lc-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
      @keyframes lc-spin { to { transform: rotate(360deg); } }
      @keyframes lc-shimmer { 100% { transform: translateX(100%); } }
      @keyframes lc-ring { 0% { opacity: .5; transform: scale(0.6); } 100% { opacity: 0; transform: scale(1.6); } }
      @keyframes lc-grow-x { from { transform: scaleX(0); } to { transform: scaleX(1); } }
      @keyframes lc-grow-y { from { transform: scaleY(0); } to { transform: scaleY(1); } }

      /* ===== Classi di utilità ===== */
      .lc-fade-up { animation: lc-fade-up .6s var(--lc-ease) both; }
      .lc-fade-in { animation: lc-fade-in .6s ease both; }
      .lc-scale-in { animation: lc-scale-in .35s var(--lc-ease) both; }
      .lc-pop-in { animation: lc-pop-in .5s var(--lc-ease) both; }
      .lc-float { animation: lc-float 5s ease-in-out infinite; }
      .lc-glow-card { box-shadow: inset 0 0 0 1px rgba(184,137,59,0.40); }

      /* Entrata a comparsa allo scroll (attivata via IntersectionObserver) */
      .lc-reveal { opacity: 0; transform: translateY(22px); transition: opacity .7s var(--lc-ease), transform .7s var(--lc-ease); will-change: opacity, transform; }
      .lc-reveal.lc-in { opacity: 1; transform: none; }

      /* Sollevamento al passaggio del mouse per le card */
      .lc-lift { transition: transform .3s var(--lc-ease), box-shadow .3s var(--lc-ease); }
      .lc-lift:hover { transform: translateY(-5px); box-shadow: 0 18px 40px -18px rgba(28, 25, 23, 0.28); }

      /* Pulsante con riflesso luminoso al passaggio */
      .lc-shine { position: relative; overflow: hidden; }
      .lc-shine::after { content: ""; position: absolute; top: 0; left: 0; width: 60%; height: 100%; transform: translateX(-130%); background: linear-gradient(100deg, transparent, rgba(255,255,255,0.35), transparent); pointer-events: none; }
      .lc-shine:hover::after { animation: lc-shimmer .9s ease; }

      /* Spinner di caricamento */
      .lc-spinner { width: 38px; height: 38px; border-radius: 50%; border: 3px solid var(--lc-accent-ring); border-top-color: var(--lc-accent); animation: lc-spin .8s linear infinite; }

      /* Skeleton shimmer per stati di caricamento */
      .lc-skeleton { background: linear-gradient(90deg, #f1efed 25%, #e7e5e4 37%, #f1efed 63%); background-size: 400% 100%; animation: lc-shimmer-bg 1.4s ease infinite; border-radius: var(--lc-radius-sm); }
      @keyframes lc-shimmer-bg { 0% { background-position: 100% 50%; } 100% { background-position: 0 50%; } }

      /* ===== Primitive del Design System (opt-in) ===== */
      /* Card: superficie pulita con bordo tenue e ombra morbida, hover discreto */
      .lc-card { background: #fff; border: 1px solid #ececea; border-radius: var(--lc-radius-lg); box-shadow: var(--lc-shadow-sm); transition: box-shadow .25s var(--lc-ease), border-color .25s var(--lc-ease), transform .25s var(--lc-ease); }
      .lc-card-hover:hover { box-shadow: var(--lc-shadow-md); border-color: #e0ddd9; }

      /* Pulsanti del design system */
      .lc-btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; font-weight: 600; font-size: 0.875rem; line-height: 1; border-radius: var(--lc-radius); padding: 0.625rem 1rem; transition: background-color .18s ease, color .18s ease, box-shadow .2s var(--lc-ease), transform .15s var(--lc-ease); cursor: pointer; }
      .lc-btn:active:not(:disabled) { transform: translateY(1px) scale(0.985); }
      .lc-btn:disabled { opacity: .5; cursor: not-allowed; }
      .lc-btn-accent { background: var(--lc-accent); color: #fff; box-shadow: var(--lc-shadow-xs); }
      .lc-btn-accent:hover:not(:disabled) { background: var(--lc-accent-strong); box-shadow: var(--lc-shadow-sm); }
      .lc-btn-ink { background: var(--lc-ink); color: #fff; }
      .lc-btn-ink:hover:not(:disabled) { background: #000; }
      .lc-btn-ghost { background: transparent; color: #57534e; }
      .lc-btn-ghost:hover:not(:disabled) { background: #f5f5f4; color: #1c1917; }

      /* Badge tenue in tinta accento */
      .lc-badge-accent { background: var(--lc-accent-soft); color: var(--lc-accent-strong); }

      /* Pillola di navigazione (stato attivo) */
      .lc-navpill-active { background: var(--lc-accent-soft); color: var(--lc-accent-strong); }

      /* Rispetta chi preferisce ridurre il movimento */
      @media (prefers-reduced-motion: reduce) {
        html { scroll-behavior: auto; }
        *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
        .lc-reveal { opacity: 1; transform: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
